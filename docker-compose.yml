services:
  postgres:
    image: postgres:15
    container_name: unimeet-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  unimeet-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unimeet-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DOTNET_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Modules__UserModule__DbConnectionString: ${POSTGRES_CONNECTION_STRING}
      Modules__UniversityModule__DbConnectionString: ${POSTGRES_CONNECTION_STRING}
      Modules__UserEnrollmentModule__DbConnectionString: ${POSTGRES_CONNECTION_STRING}
      Modules__PermissionsModule__DbConnectionString: ${POSTGRES_CONNECTION_STRING}
      Modules__MessagingModule__DbConnectionString: ${POSTGRES_CONNECTION_STRING}
      Modules__MatchingModule__DbConnectionString: ${POSTGRES_CONNECTION_STRING}
      Modules__UserModule__Auth__Secret: ${USER_MODULE_AUTH_SECRET}
      Modules__UserModule__Auth__Issuer: ${USER_MODULE_AUTH_ISSUER}
      Modules__UserModule__Auth__Audience: ${USER_MODULE_AUTH_AUDIENCE}
      Modules__UserModule__WebsiteUrl: ${USER_MODULE_WEBSITE_URL}
      Modules__MailingModule__Smtp__Host: ${MAILING_MODULE_SMTP_HOST}
      Modules__MailingModule__Smtp__Port: ${MAILING_MODULE_SMTP_PORT}
      Modules__MailingModule__Smtp__Username: ${MAILING_MODULE_SMTP_USERNAME}
      Modules__MailingModule__Smtp__Password: ${MAILING_MODULE_SMTP_PASSWORD}
      Modules__MailingModule__Smtp__SenderName: ${MAILING_MODULE_SMTP_SENDER_NAME}
      Modules__PermissionsModule__SeedDatabase: ${PERMISSIONS_MODULE_SEED_DATABASE}
    ports:
      - "8080:8080"
    restart: always

volumes:
  pgdata:
